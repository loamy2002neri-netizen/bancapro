<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1280px;height:720px;overflow:hidden;background:#070a14;}
  .stage{
    position:relative;width:1280px;height:720px;
    font-family:"Segoe UI",Roboto,Arial,Helvetica,sans-serif;
    background:
      radial-gradient(900px 600px at 88% 18%, rgba(124,92,255,.30), transparent 60%),
      radial-gradient(800px 600px at 6% 92%, rgba(45,212,167,.18), transparent 55%),
      linear-gradient(135deg,#0a0e1d 0%,#0d1226 55%,#10172e 100%);
    overflow:hidden;
  }
  /* faint chart grid texture */
  .grid{position:absolute;inset:0;opacity:.10;
    background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
    background-size:64px 64px;}
  .vignette{position:absolute;inset:0;box-shadow:inset 0 0 220px 60px rgba(0,0,0,.65);}

  /* brand row */
  .brand{position:absolute;top:46px;left:60px;display:flex;align-items:center;gap:16px;z-index:5;}
  .logo{width:58px;height:58px;border-radius:15px;
    background:linear-gradient(150deg,#6d78ff,#9a5cff);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px rgba(124,92,255,.55);}
  .logo svg{width:34px;height:34px;}
  .brand .name{font-size:34px;font-weight:800;color:#fff;letter-spacing:.5px;}
  .brand .name b{background:linear-gradient(90deg,#8aa0ff,#b98cff);-webkit-background-clip:text;background-clip:text;color:transparent;}

  /* headline */
  .copy{position:absolute;left:60px;top:210px;width:760px;z-index:6;}
  .badge{display:inline-flex;align-items:center;gap:10px;
    background:rgba(124,92,255,.16);border:1.5px solid rgba(154,124,255,.55);
    color:#cdbcff;font-weight:700;font-size:22px;letter-spacing:2px;
    padding:10px 20px;border-radius:999px;text-transform:uppercase;margin-bottom:26px;}
  .badge .play{width:0;height:0;border-left:14px solid #b98cff;border-top:9px solid transparent;border-bottom:9px solid transparent;}
  h1{font-size:96px;line-height:.98;font-weight:900;color:#ffffff;letter-spacing:-2px;text-shadow:0 6px 30px rgba(0,0,0,.5);}
  h1 .grad{background:linear-gradient(90deg,#6d9bff 0%,#9a5cff 60%,#c06bff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{margin-top:26px;font-size:31px;font-weight:600;color:#aeb8d6;}
  .sub .hl{color:#2dd4a7;font-weight:800;}

  /* dashboard mock on the right */
  .panel{position:absolute;right:54px;top:150px;width:430px;height:430px;
    background:linear-gradient(160deg,rgba(22,28,52,.92),rgba(14,18,38,.92));
    border:1px solid rgba(124,140,255,.28);border-radius:24px;
    box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.02) inset;
    z-index:4;overflow:hidden;}
  .panel .ttl{position:absolute;top:22px;left:26px;color:#e7ecff;font-size:22px;font-weight:800;}
  .panel .dot3{position:absolute;top:30px;right:26px;display:flex;gap:8px;}
  .panel .dot3 i{width:11px;height:11px;border-radius:50%;display:block;}
  .kpi{position:absolute;top:70px;left:26px;display:flex;gap:14px;}
  .kpi .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;min-width:120px;}
  .kpi .card .lab{font-size:14px;color:#8b97bd;font-weight:600;letter-spacing:.4px;}
  .kpi .card .val{font-size:30px;font-weight:900;color:#fff;margin-top:4px;}
  .kpi .card .val.green{color:#2dd4a7;}
  .kpi .card .val.blue{color:#7e9bff;}
  svg.line{position:absolute;left:0;bottom:0;width:430px;height:250px;}

  .url{position:absolute;right:60px;bottom:40px;color:#7a86ab;font-size:24px;font-weight:700;letter-spacing:1px;z-index:6;}
</style>
</head>
<body>
<div class="stage">
  <div class="grid"></div>

  <div class="brand">
    <span class="logo">
      <svg viewBox="0 0 100 100" fill="none"><path d="M50 12 L86 86 L64 86 L50 54 L36 86 L14 86 Z" fill="#fff"/></svg>
    </span>
    <span class="name">Apo<b>stack</b></span>
  </div>

  <div class="copy">
    <div class="badge"><span class="play"></span> Tutorial completo</div>
    <h1>COMO USAR<br><span class="grad">A APOSTACK</span></h1>
    <div class="sub">Passo a passo pra <span class="hl">organizar sua banca</span></div>
  </div>

  <div class="panel">
    <div class="ttl">Evolução Financeira</div>
    <div class="dot3"><i style="background:#ff5d6c"></i><i style="background:#ffce5d"></i><i style="background:#2dd4a7"></i></div>
    <div class="kpi">
      <div class="card"><div class="lab">SALDO</div><div class="val">R$ 24.360</div></div>
      <div class="card"><div class="lab">ROI</div><div class="val green">+18,4%</div></div>
    </div>
    <svg class="line" viewBox="0 0 430 250" preserveAspectRatio="none">
      <defs>
        <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#5d8bff"/><stop offset="1" stop-color="#9a5cff"/>
        </linearGradient>
        <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(124,140,255,.45)"/><stop offset="1" stop-color="rgba(124,140,255,0)"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="M0,205 L55,180 L110,195 L165,150 L220,165 L275,110 L330,120 L385,60 L430,40 L430,250 L0,250 Z" fill="url(#fill)"/>
      <path d="M0,205 L55,180 L110,195 L165,150 L220,165 L275,110 L330,120 L385,60 L430,40" fill="none" stroke="url(#stroke)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
      <circle cx="275" cy="110" r="7" fill="#fff"/><circle cx="385" cy="60" r="7" fill="#2dd4a7"/>
    </svg>
  </div>

  <div class="url">apostack.com</div>
  <div class="vignette"></div>
</div>
</body>
</html>
