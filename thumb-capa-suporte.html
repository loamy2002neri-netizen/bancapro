<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1500px;height:500px;overflow:hidden;background:#070a14;font-family:"Segoe UI",Roboto,Arial,sans-serif}
  .stage{position:relative;width:1500px;height:500px;
    background:
      radial-gradient(700px 600px at 88% 50%, rgba(154,124,255,.32), transparent 60%),
      radial-gradient(500px 500px at 12% 100%, rgba(45,212,167,.18), transparent 55%),
      radial-gradient(500px 500px at 0% 0%, rgba(109,120,255,.22), transparent 60%),
      linear-gradient(135deg,#0a0e1d 0%,#10172e 55%,#161f3e 100%);
  }
  .grid{position:absolute;inset:0;opacity:.07;
    background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
    background-size:80px 80px;}
  .vignette{position:absolute;inset:0;box-shadow:inset 0 0 180px 40px rgba(0,0,0,.55);}

  /* ESQUERDA: brand */
  .brand-block{position:absolute;left:80px;top:50%;transform:translateY(-50%);
    display:flex;align-items:center;gap:32px}
  .triangle{width:130px;height:130px;flex-shrink:0;
    filter:drop-shadow(0 18px 36px rgba(124,92,255,.55));}
  .triangle svg{width:100%;height:100%;display:block}
  .brand-name{font-size:90px;font-weight:900;letter-spacing:-2px;color:#fff;line-height:1;
    text-shadow:0 6px 24px rgba(0,0,0,.5)}
  .brand-name b{background:linear-gradient(90deg,#8aa0ff,#b98cff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{font-size:20px;color:#aeb8d6;margin-top:8px;font-weight:500;letter-spacing:.3px}

  /* DIVISOR */
  .divider{position:absolute;left:780px;top:50%;transform:translateY(-50%);
    width:2px;height:240px;
    background:linear-gradient(180deg,transparent,rgba(154,124,255,.45),transparent)}

  /* DIREITA: suporte */
  .support-block{position:absolute;left:850px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:18px;max-width:600px}
  .badge{display:inline-flex;align-items:center;gap:12px;
    padding:10px 22px;border-radius:999px;
    background:rgba(45,212,167,.16);
    border:1.5px solid rgba(92,242,192,.55);
    width:fit-content}
  .badge .dot{width:10px;height:10px;border-radius:50%;background:#5cf2c0;
    box-shadow:0 0 14px #2dd4a7;animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
  .badge-text{font-size:18px;font-weight:800;color:#5cf2c0;letter-spacing:1.2px;text-transform:uppercase}

  .support-h{font-size:70px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px;
    text-shadow:0 4px 20px rgba(0,0,0,.5)}
  .support-h .high{background:linear-gradient(90deg,#6d9bff,#b98cff);
    -webkit-background-clip:text;background-clip:text;color:transparent}

  .support-sub{font-size:22px;color:#cdd5ea;font-weight:500;line-height:1.4;margin-top:4px}
  .support-sub b{color:#fff;font-weight:700}

  .channels{display:flex;gap:18px;margin-top:8px;flex-wrap:wrap}
  .channel{display:inline-flex;align-items:center;gap:10px;
    padding:10px 18px;border-radius:12px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(154,124,255,.3);
    font-size:15px;font-weight:600;color:#e7ecff}
  .channel svg{width:18px;height:18px;stroke:#cdbcff;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="stage">
  <div class="grid"></div>

  <!-- ESQUERDA: brand -->
  <div class="brand-block">
    <div class="triangle">
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="triG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6d78ff"/>
            <stop offset="0.5" stop-color="#9a5cff"/>
            <stop offset="1" stop-color="#c06bff"/>
          </linearGradient>
        </defs>
        <path d="M100 18 L172 172 L128 172 L100 110 L72 172 L28 172 Z" fill="url(#triG)"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Apo<b>stack</b></div>
      <div class="tagline">Gestão de banca pra apostador sério</div>
    </div>
  </div>

  <!-- Divisor -->
  <div class="divider"></div>

  <!-- DIREITA: suporte -->
  <div class="support-block">
    <div class="badge">
      <span class="dot"></span>
      <span class="badge-text">ONLINE · RESPOSTA EM 24H</span>
    </div>
    <div class="support-h">Central de <span class="high">Suporte</span></div>
    <div class="support-sub">Tirando suas dúvidas sobre a Apostack <br/><b>todos os dias úteis</b>.</div>
    <div class="channels">
      <div class="channel">
        <svg viewBox="0 0 24 24"><path d="M21 8V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-1"/><path d="M3 7l9 6 9-6"/></svg>
        suporteapostack@gmail.com
      </div>
      <div class="channel">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/></svg>
        apostack.com
      </div>
    </div>
  </div>

  <div class="vignette"></div>
</div>
</body>
</html>
