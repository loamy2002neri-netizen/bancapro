<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1080px;overflow:hidden;background:#070a14;font-family:"Segoe UI",Roboto,Arial,sans-serif}
  .stage{position:relative;width:1080px;height:1080px;
    background:
      radial-gradient(720px 720px at 50% 36%, rgba(154,124,255,.42), transparent 60%),
      radial-gradient(540px 540px at 18% 90%, rgba(45,212,167,.18), transparent 55%),
      radial-gradient(540px 540px at 86% 96%, rgba(109,120,255,.18), transparent 60%),
      linear-gradient(160deg,#0a0e1d 0%,#10172e 55%,#161f3e 100%);
  }
  /* faint grid texture (oculto na area cortada do circle) */
  .grid{position:absolute;inset:0;opacity:.08;
    background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
    background-size:96px 96px;}

  /* Círculo guia (a área visível no WhatsApp) - centralizado */
  .triangle{position:absolute;top:180px;left:50%;transform:translateX(-50%);
    width:340px;height:340px;
    filter:drop-shadow(0 30px 60px rgba(124,92,255,.55));}
  .triangle svg{width:100%;height:100%;display:block}

  .brand-name{position:absolute;top:560px;left:0;right:0;text-align:center;
    font-size:140px;font-weight:900;letter-spacing:-2px;color:#fff;line-height:1;
    text-shadow:0 8px 32px rgba(0,0,0,.5);}
  .brand-name b{background:linear-gradient(90deg,#8aa0ff,#b98cff);
    -webkit-background-clip:text;background-clip:text;color:transparent}

  .badge{position:absolute;top:760px;left:50%;transform:translateX(-50%);
    display:inline-flex;align-items:center;gap:18px;
    padding:22px 48px;border-radius:999px;
    background:linear-gradient(90deg,rgba(124,92,255,.20),rgba(154,124,255,.25));
    border:2px solid rgba(154,124,255,.65);
    backdrop-filter:blur(10px);
    box-shadow:0 16px 40px rgba(124,92,255,.30);}
  .badge svg{width:48px;height:48px;stroke:#cdbcff;fill:none;
    stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .badge-text{font-size:48px;font-weight:900;color:#fff;
    letter-spacing:4px;text-transform:uppercase}

  .reply{position:absolute;top:880px;left:0;right:0;text-align:center;
    font-size:24px;font-weight:600;color:#aeb8d6;letter-spacing:1px}
  .reply .dot{display:inline-block;width:10px;height:10px;border-radius:50%;
    background:#2dd4a7;margin-right:10px;box-shadow:0 0 16px #2dd4a7;
    vertical-align:middle;animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
</style>
</head>
<body>
<div class="stage">
  <div class="grid"></div>

  <!-- Triangle A logo -->
  <div class="triangle">
    <svg viewBox="0 0 200 200">
      <defs>
        <linearGradient id="triG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#6d78ff"/>
          <stop offset="0.5" stop-color="#9a5cff"/>
          <stop offset="1" stop-color="#c06bff"/>
        </linearGradient>
      </defs>
      <path d="M100 18 L172 172 L128 172 L100 110 L72 172 L28 172 Z" fill="url(#triG)"/>
    </svg>
  </div>

  <!-- Apostack name -->
  <div class="brand-name">Apo<b>stack</b></div>

  <!-- SUPORTE badge with headset icon -->
  <div class="badge">
    <svg viewBox="0 0 24 24">
      <path d="M3 18v-6a9 9 0 0118 0v6"/>
      <path d="M21 19a2 2 0 01-2 2h-1v-7h3v5zM3 19a2 2 0 002 2h1v-7H3v5z"/>
    </svg>
    <span class="badge-text">SUPORTE</span>
  </div>

  <!-- Status -->
  <div class="reply"><span class="dot"></span>Resposta em até 24h</div>
</div>
</body>
</html>
